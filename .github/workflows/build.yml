name: Build Null Client DLL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake (ChameleonChams subdir)
        run: cmake -S ${{ github.workspace }}/ChameleonChams -B ${{ github.workspace }}/ChameleonChams/build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build ${{ github.workspace }}/ChameleonChams/build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NullClient-DLL
          path: ${{ github.workspace }}/ChameleonChams/build/Release/*.dll
